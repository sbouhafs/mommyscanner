<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MommyScanner{% endblock %}</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; background: #fdf6f0; color: #333; }
    h1 { color: #c86f9a; }
    nav a { margin-right: 1rem; color: #c86f9a; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .card { background: white; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    input[type=text] { padding: 0.5rem; width: 70%; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.5rem 1rem; background: #c86f9a; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #a8507a; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #f5dde9; }
    .tag { display: inline-block; background: #f5dde9; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>🍼 MommyScanner</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/history">History</a>
    <a href="/products">Products</a>
  </nav>
  <hr />
  {% block content %}{% endblock %}
</body>
</html>
